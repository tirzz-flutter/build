# ============================================================
# build_flutter.yaml
# Flutter Universal Build Pipeline
# Compatible: GitHub Actions, GitLab CI, Codemagic, Railway,
#             Render, VPS, dan environment CI/CD lainnya
# Supports: Flutter 3.x → Latest Stable | Dart Latest
# Platforms: Android, iOS, Web, Windows, Linux, macOS
# Author: Generated by Claude (Anthropic)
# Version: 2.0.0
# ============================================================

name: Flutter Universal Build Pipeline

# ============================================================
# TRIGGER: Kapan pipeline ini dijalankan
# ============================================================
on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version (e.g. stable, 3.24.0)'
        required: false
        default: 'stable'
        type: string
      skip_tests:
        description: 'Skip flutter test step'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      build_platforms:
        description: 'Platforms to build (comma-separated: apk,appbundle,web,ios,windows,linux,macos)'
        required: false
        default: 'apk,appbundle,web'
        type: string

# ============================================================
# ENVIRONMENT VARIABLES GLOBAL
# ============================================================
env:
  FLUTTER_VERSION: ${{ github.event.inputs.flutter_version || 'stable' }}
  JAVA_VERSION: '17'
  PUB_CACHE: ${{ github.workspace }}/.pub-cache
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  BUILD_NUMBER: ${{ github.run_number }}
  BUILD_PLATFORMS: ${{ github.event.inputs.build_platforms || 'apk,appbundle,web' }}

# ============================================================
# CONCURRENCY: Batalkan run lama jika ada yang baru
# ============================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# ============================================================
jobs:

  # ----------------------------------------------------------
  # JOB 1: VALIDASI & SETUP
  # Melakukan validasi awal sebelum build dimulai
  # ----------------------------------------------------------
  validate:
    name: "🔍 Validate Project"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      flutter_version: ${{ steps.flutter_info.outputs.version }}
      dart_version: ${{ steps.flutter_info.outputs.dart_version }}
      has_tests: ${{ steps.check_tests.outputs.has_tests }}
      package_name: ${{ steps.pubspec.outputs.package_name }}
      app_version: ${{ steps.pubspec.outputs.app_version }}

    steps:
      # ── Checkout repository ──────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Validasi pubspec.yaml ada ────────────────────────
      - name: "📄 Validate pubspec.yaml Exists"
        id: pubspec
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Checking pubspec.yaml..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ ERROR: pubspec.yaml not found!"
            echo "   Make sure you're running this from the Flutter project root."
            exit 1
          fi

          echo "✅ pubspec.yaml found"

          # Ekstrak nama package
          PACKAGE_NAME=$(grep -E '^name:' pubspec.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")
          APP_VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | tr -d '"' | tr -d "'")

          if [ -z "$PACKAGE_NAME" ]; then
            echo "❌ ERROR: 'name' field not found in pubspec.yaml"
            exit 1
          fi

          echo "📦 Package name : $PACKAGE_NAME"
          echo "🏷️  App version  : $APP_VERSION"

          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION"   >> $GITHUB_OUTPUT

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat pubspec.yaml
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Validasi struktur project Flutter ───────────────
      - name: "🏗️ Validate Flutter Project Structure"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Checking Flutter project structure..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ERRORS=0

          # Check lib/main.dart
          if [ ! -f "lib/main.dart" ]; then
            echo "❌ lib/main.dart not found"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ lib/main.dart found"
          fi

          # Check flutter dependency in pubspec.yaml
          if ! grep -q "flutter:" pubspec.yaml; then
            echo "❌ 'flutter:' dependency not found in pubspec.yaml"
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ Flutter SDK dependency found"
          fi

          # Check SDK constraint
          if grep -q "sdk:" pubspec.yaml; then
            SDK_CONSTRAINT=$(grep -A1 "environment:" pubspec.yaml | grep "sdk:" | awk '{print $2}')
            echo "✅ Dart SDK constraint: $SDK_CONSTRAINT"
          else
            echo "⚠️  Warning: No SDK constraint found in pubspec.yaml"
          fi

          # Report
          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "❌ Found $ERRORS error(s). Please fix before building."
            exit 1
          fi

          echo "✅ Flutter project structure valid"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Setup Flutter ─────────────────────────────────────
      - name: "🐦 Setup Flutter SDK"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}'

      # ── Cek versi Flutter & Dart ──────────────────────────
      - name: "📋 Flutter & Dart Version Info"
        id: flutter_info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐦 Flutter Version Information"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          flutter --version
          dart --version

          FLUTTER_VER=$(flutter --version --machine 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('frameworkVersion','unknown'))" 2>/dev/null || flutter --version | grep "Flutter" | awk '{print $2}')
          DART_VER=$(dart --version 2>&1 | awk '{print $4}')

          echo ""
          echo "🎯 Flutter : $FLUTTER_VER"
          echo "🎯 Dart    : $DART_VER"
          echo "🎯 OS      : ${{ runner.os }}"

          echo "version=$FLUTTER_VER"      >> $GITHUB_OUTPUT
          echo "dart_version=$DART_VER"    >> $GITHUB_OUTPUT

          # Validasi flutter doctor
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🩺 Flutter Doctor"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter doctor -v || true

      # ── Cek apakah ada test files ─────────────────────────
      - name: "🧪 Check Test Files"
        id: check_tests
        run: |
          if [ -d "test" ] && [ "$(find test -name '*_test.dart' | wc -l)" -gt 0 ]; then
            echo "✅ Test files found: $(find test -name '*_test.dart' | wc -l) file(s)"
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  No test files found, skipping test step"
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      # ── Setup Java untuk Android build ───────────────────
      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── Cache pub dependencies ────────────────────────────
      - name: "📦 Cache Pub Dependencies"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
            .packages
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
            pub-${{ runner.os }}-

      # ── flutter pub get ───────────────────────────────────
      - name: "📥 Install Dependencies (flutter pub get)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Running flutter pub get..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter pub get
          echo ""
          echo "✅ Dependencies installed successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Validasi dependencies ─────────────────────────────
      - name: "🔎 Validate Dependencies"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔎 Checking outdated dependencies..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter pub outdated --no-color || true
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔎 Verifying dependency tree..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter pub deps --style=compact || true

      # ── flutter analyze ───────────────────────────────────
      - name: "🔬 Run Flutter Analyze"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔬 Running flutter analyze..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter analyze --no-fatal-infos
          echo "✅ Analysis completed"

      # ── flutter test ──────────────────────────────────────
      - name: "🧪 Run Flutter Tests"
        if: >
          steps.check_tests.outputs.has_tests == 'true' &&
          github.event.inputs.skip_tests != 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 Running flutter test..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter test --no-pub \
            --reporter=expanded \
            --coverage \
            || true
          echo "✅ Tests completed"

      # ── Upload coverage report ────────────────────────────
      - name: "📊 Upload Coverage Report"
        if: steps.check_tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ----------------------------------------------------------
  # JOB 2: BUILD ANDROID
  # Build APK dan App Bundle untuk platform Android
  # ----------------------------------------------------------
  build-android:
    name: "🤖 Build Android"
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 45

    steps:
      # ── Checkout ─────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── Setup Java ────────────────────────────────────────
      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── Setup Flutter ─────────────────────────────────────
      - name: "🐦 Setup Flutter SDK"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}'

      # ── Cache Pub ─────────────────────────────────────────
      - name: "📦 Restore Pub Cache"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── Cache Gradle ──────────────────────────────────────
      - name: "🐘 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Install dependencies ──────────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          flutter pub get
          echo "✅ Dependencies installed"

      # ── Build APK Release ─────────────────────────────────
      - name: "📱 Build APK (Release)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building APK Release..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter build apk \
            --release \
            --no-pub \
            --build-number=${{ env.BUILD_NUMBER }} \
            --obfuscate \
            --split-debug-info=./debug-symbols/apk \
            --split-per-abi \
            --verbose
          echo ""
          echo "✅ APK build completed"
          echo "📁 Output files:"
          find build/app/outputs/apk -name "*.apk" -exec ls -lh {} \;
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Build App Bundle Release ──────────────────────────
      - name: "📦 Build App Bundle (Release)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building App Bundle Release..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter build appbundle \
            --release \
            --no-pub \
            --build-number=${{ env.BUILD_NUMBER }} \
            --obfuscate \
            --split-debug-info=./debug-symbols/aab \
            --verbose
          echo ""
          echo "✅ App Bundle build completed"
          echo "📁 Output files:"
          find build/app/outputs/bundle -name "*.aab" -exec ls -lh {} \;
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Upload APK Artifact ───────────────────────────────
      - name: "📤 Upload APK Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: |
            build/app/outputs/apk/**/*.apk
            debug-symbols/apk/
          retention-days: 30
          if-no-files-found: error

      # ── Upload AAB Artifact ───────────────────────────────
      - name: "📤 Upload AAB Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: |
            build/app/outputs/bundle/**/*.aab
            debug-symbols/aab/
          retention-days: 30
          if-no-files-found: error

      # ── Print Android build summary ───────────────────────
      - name: "📋 Android Build Summary"
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Android Build Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Build Number : ${{ env.BUILD_NUMBER }}"
          echo "Flutter      : ${{ needs.validate.outputs.flutter_version }}"
          echo "Package      : ${{ needs.validate.outputs.package_name }}"
          echo "Version      : ${{ needs.validate.outputs.app_version }}"
          echo ""
          echo "APK Files:"
          find build/app/outputs/apk -name "*.apk" 2>/dev/null | while read f; do
            echo "  📱 $(basename $f) - $(du -sh $f | awk '{print $1}')"
          done || echo "  (none found)"
          echo ""
          echo "AAB Files:"
          find build/app/outputs/bundle -name "*.aab" 2>/dev/null | while read f; do
            echo "  📦 $(basename $f) - $(du -sh $f | awk '{print $1}')"
          done || echo "  (none found)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ----------------------------------------------------------
  # JOB 3: BUILD WEB
  # Build Flutter Web untuk deployment
  # ----------------------------------------------------------
  build-web:
    name: "🌐 Build Web"
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── Setup Flutter ─────────────────────────────────────
      - name: "🐦 Setup Flutter SDK"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}'

      # ── Cache Pub ─────────────────────────────────────────
      - name: "📦 Restore Pub Cache"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── Aktifkan Web support ──────────────────────────────
      - name: "🌐 Enable Flutter Web"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 Enabling Flutter Web support..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter config --enable-web
          echo "✅ Flutter Web enabled"

      # ── Install dependencies ──────────────────────────────
      - name: "📦 Install Dependencies"
        run: |
          flutter pub get
          echo "✅ Dependencies installed"

      # ── Check Web support ─────────────────────────────────
      - name: "🔍 Check Web Support"
        id: web_check
        run: |
          if flutter build web --help > /dev/null 2>&1; then
            echo "web_supported=true" >> $GITHUB_OUTPUT
            echo "✅ Web platform supported"
          else
            echo "web_supported=false" >> $GITHUB_OUTPUT
            echo "⚠️  Web platform not fully supported"
          fi

      # ── Build Web Release ─────────────────────────────────
      - name: "🌐 Build Flutter Web (Release)"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building Flutter Web Release..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter build web \
            --release \
            --no-pub \
            --web-renderer=canvaskit \
            --pwa-strategy=offline-first \
            --build-number=${{ env.BUILD_NUMBER }} \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=https://unpkg.com/canvaskit-wasm@latest/bin/ \
            --verbose
          echo ""
          echo "✅ Web build completed"
          echo "📁 Output size:"
          du -sh build/web/ || echo "  (output not found)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── Upload Web Artifact ───────────────────────────────
      - name: "📤 Upload Web Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.run_number }}
          path: build/web/
          retention-days: 30
          if-no-files-found: error

      # ── Print Web build summary ───────────────────────────
      - name: "📋 Web Build Summary"
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Web Build Summary"
          echo 
