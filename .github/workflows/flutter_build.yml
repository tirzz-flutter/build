name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'Tipe build'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Flutter version
        run: flutter --version

      - name: Download & Extract ZIP
        run: |
          curl -L --retry 3 -o source.zip "${{ inputs.zip_url }}"
          unzip -q source.zip -d project_raw

          FLUTTER_ROOT=$(find project_raw -name "pubspec.yaml" -maxdepth 4 | head -1 | xargs dirname)
          if [ -z "$FLUTTER_ROOT" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          echo "✅ FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Fix font_awesome_flutter - override ke versi git yang sudah fix
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          rm -f pubspec.lock

          python3 << 'PYEOF'
import re

with open("pubspec.yaml", "r") as f:
    content = f.read()

print("=== pubspec.yaml SEBELUM patch ===")
print(content[:2000])

# Tambahkan dependency_overrides untuk font_awesome_flutter
# Gunakan versi dari master branch yang sudah fix IconData final class
override_section = """
dependency_overrides:
  font_awesome_flutter:
    git:
      url: https://github.com/fluttercommunity/font_awesome_flutter.git
      ref: master
"""

if "dependency_overrides:" in content:
    # Sudah ada, inject font_awesome ke dalamnya
    font_entry = (
        "  font_awesome_flutter:\n"
        "    git:\n"
        "      url: https://github.com/fluttercommunity/font_awesome_flutter.git\n"
        "      ref: master\n"
    )
    # Jangan duplicate
    if "font_awesome_flutter" not in content.split("dependency_overrides:")[1].split("\n\n")[0]:
        content = content.replace(
            "dependency_overrides:",
            "dependency_overrides:\n" + font_entry
        )
else:
    content = content.rstrip() + "\n" + override_section

with open("pubspec.yaml", "w") as f:
    f.write(content)

print("\n=== pubspec.yaml SETELAH patch ===")
print(content[-1500:])
PYEOF

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter pub get

      - name: Build APK Release
        if: ${{ inputs.build_type == 'release' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build APK Debug
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Find APK
        run: |
          APK_PATH=$(find "${{ env.FLUTTER_ROOT }}/build/app/outputs" -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ APK: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          
