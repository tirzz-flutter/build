name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL to the ZIP file of the Flutter project'
        required: true
        type: string
      tag:
        description: 'Build tag / identifier'
        required: true
        type: string
      build_type:
        description: 'Build type: debug or release'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Check Flutter Version
        run: flutter --version

      - name: Download & Extract ZIP
        run: |
          echo "⬇️ Downloading ZIP..."
          curl -L --retry 3 -o source.zip "${{ inputs.zip_url }}"
          unzip -q source.zip -d project_raw

          FLUTTER_ROOT=$(find project_raw -name "pubspec.yaml" -maxdepth 4 | head -1 | xargs dirname)
          if [ -z "$FLUTTER_ROOT" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          echo "✅ Flutter root: $FLUTTER_ROOT"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Fix incompatible packages
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          # Upgrade font_awesome_flutter ke versi terbaru yang kompatibel Flutter 3.8+
          if grep -q "font_awesome_flutter" pubspec.yaml; then
            echo "🔧 Fixing font_awesome_flutter..."
            sed -i 's/font_awesome_flutter:.*/font_awesome_flutter: ^10.8.0/' pubspec.yaml
            flutter pub add font_awesome_flutter:'^10.8.0' --no-pub || true
          fi

          # Hapus pubspec.lock agar dependency resolve ulang dengan versi kompatibel
          rm -f pubspec.lock

      - name: Flutter pub upgrade
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter pub upgrade --tighten || flutter pub get

      - name: Build APK Release
        if: ${{ inputs.build_type == 'release' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build APK Debug
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Find APK
        run: |
          APK_PATH=$(find ${{ env.FLUTTER_ROOT }}/build/app/outputs -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ APK ditemukan: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          
