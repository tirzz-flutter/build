# ============================================================
# .github/workflows/flutter_build.yml
# Flutter Build — Triggered via Telegram Bot (GitHub API)
# ============================================================
# Kompatibel dengan payload:
# {
#   "ref": "main",
#   "inputs": {
#     "zip_url": "...",
#     "tag": "...",
#     "build_type": "..."
#   }
# }
# ============================================================

name: Flutter Build

# ============================================================
# TRIGGER
# ============================================================
on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag / label untuk build ini'
        required: true
        type: string
      build_type:
        description: 'Tipe build (release / debug)'
        required: true
        type: string

# ============================================================
# PERMISSIONS — Minimum yang diperlukan
# ============================================================
permissions:
  contents: read
  actions: read

# ============================================================
# CONCURRENCY — Batalkan run lama jika ada yang baru
# ============================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.tag }}
  cancel-in-progress: true

# ============================================================
# ENVIRONMENT VARIABLES
# ============================================================
env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: 'stable'
  PUB_CACHE: ${{ github.workspace }}/.pub-cache
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  BUILD_NUMBER: ${{ github.run_number }}
  WORK_DIR: ${{ github.workspace }}/flutter_project

# ============================================================
# JOBS
# ============================================================
jobs:

  build:
    name: "🚀 Build Flutter APK [${{ github.event.inputs.tag }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      # ── 1. Checkout repository ────────────────────────────
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      # ── 2. Print input info ───────────────────────────────
      - name: "📋 Print Build Inputs"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Build Inputs"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🏷️  tag        : ${{ github.event.inputs.tag }}"
          echo "  🔨 build_type : ${{ github.event.inputs.build_type }}"
          echo "  🔗 zip_url    : ${{ github.event.inputs.zip_url }}"
          echo "  🔢 build_no   : ${{ env.BUILD_NUMBER }}"
          echo "  📅 timestamp  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  👤 actor      : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 3. Validasi input zip_url ─────────────────────────
      - name: "🔍 Validate Inputs"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Validating inputs..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ZIP_URL="${{ github.event.inputs.zip_url }}"
          TAG="${{ github.event.inputs.tag }}"
          BUILD_TYPE="${{ github.event.inputs.build_type }}"

          if [ -z "$ZIP_URL" ]; then
            echo "❌ ERROR: Input 'zip_url' tidak boleh kosong"
            exit 1
          fi

          if [ -z "$TAG" ]; then
            echo "❌ ERROR: Input 'tag' tidak boleh kosong"
            exit 1
          fi

          if [ -z "$BUILD_TYPE" ]; then
            echo "❌ ERROR: Input 'build_type' tidak boleh kosong"
            exit 1
          fi

          # Validasi format URL
          if [[ ! "$ZIP_URL" =~ ^https?:// ]]; then
            echo "❌ ERROR: 'zip_url' harus berupa URL valid (http/https)"
            echo "   Diterima: $ZIP_URL"
            exit 1
          fi

          echo "✅ zip_url    : OK"
          echo "✅ tag        : OK ($TAG)"
          echo "✅ build_type : OK ($BUILD_TYPE)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 4. Setup Java 17 ──────────────────────────────────
      - name: "☕ Setup Java ${{ env.JAVA_VERSION }} (Temurin)"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ── 5. Setup Flutter Stable ───────────────────────────
      - name: "🐦 Setup Flutter SDK (Stable)"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-stable-${{ runner.os }}'

      # ── 6. Tampilkan versi Flutter & Dart ─────────────────
      - name: "📋 Flutter & Dart Version"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐦 Flutter Version"
          flutter --version
          echo ""
          echo "🎯 Dart Version"
          dart --version
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 7. Flutter Doctor ─────────────────────────────────
      - name: "🩺 Flutter Doctor"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🩺 Flutter Doctor"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter doctor -v || true

      # ── 8. Accept Android Licenses ────────────────────────
      - name: "📜 Accept Android SDK Licenses"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📜 Accepting Android licenses..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          yes | flutter doctor --android-licenses || true
          echo "✅ Licenses accepted"

      # ── 9. Cache Pub Dependencies ─────────────────────────
      - name: "📦 Cache Pub Dependencies"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ${{ env.WORK_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ github.event.inputs.tag }}-${{ github.run_id }}
          restore-keys: |
            pub-${{ runner.os }}-

      # ── 10. Cache Gradle ──────────────────────────────────
      - name: "🐘 Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GRADLE_USER_HOME }}/caches
            ${{ env.GRADLE_USER_HOME }}/wrapper
          key: gradle-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 11. Download ZIP dari zip_url ─────────────────────
      - name: "⬇️ Download ZIP from zip_url"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⬇️  Downloading ZIP..."
          echo "    URL: ${{ github.event.inputs.zip_url }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          mkdir -p /tmp/flutter_zip

          HTTP_STATUS=$(curl -L \
            --output /tmp/flutter_zip/project.zip \
            --write-out "%{http_code}" \
            --silent \
            --show-error \
            --max-time 300 \
            --retry 3 \
            --retry-delay 5 \
            "${{ github.event.inputs.zip_url }}")

          echo "📡 HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: Gagal download ZIP (HTTP $HTTP_STATUS)"
            echo "   URL: ${{ github.event.inputs.zip_url }}"
            exit 1
          fi

          ZIP_SIZE=$(du -sh /tmp/flutter_zip/project.zip | awk '{print $1}')
          echo "✅ Download berhasil (Ukuran: $ZIP_SIZE)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 12. Extract ZIP ───────────────────────────────────
      - name: "📂 Extract ZIP"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Extracting ZIP..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          mkdir -p /tmp/flutter_extracted

          # Validasi file ZIP
          if ! file /tmp/flutter_zip/project.zip | grep -q "Zip\|zip\|archive\|compressed"; then
            echo "⚠️  Warning: File mungkin bukan ZIP standar, mencoba extract..."
          fi

          unzip -q /tmp/flutter_zip/project.zip \
            -d /tmp/flutter_extracted \
            || {
              echo "❌ ERROR: Gagal mengekstrak ZIP"
              echo "   Pastikan zip_url mengarah ke file ZIP yang valid"
              file /tmp/flutter_zip/project.zip
              exit 1
            }

          echo "✅ Ekstraksi berhasil"
          echo "📁 Isi direktori hasil ekstraksi:"
          ls -la /tmp/flutter_extracted/
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 13. Cari folder Flutter otomatis ──────────────────
      - name: "🔍 Find Flutter Project (pubspec.yaml)"
        id: find_project
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 Mencari pubspec.yaml di hasil ekstraksi..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Cari pubspec.yaml, ambil yang pertama & paling dangkal
          PUBSPEC_PATH=$(find /tmp/flutter_extracted \
            -name "pubspec.yaml" \
            -not -path "*/\.*" \
            -not -path "*/build/*" \
            -not -path "*/.dart_tool/*" \
            | sort \
            | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ ERROR: pubspec.yaml tidak ditemukan di dalam ZIP!"
            echo ""
            echo "📁 Struktur ZIP yang diterima:"
            find /tmp/flutter_extracted -maxdepth 4 | head -50
            echo ""
            echo "💡 Pastikan ZIP berisi project Flutter yang valid"
            echo "   (harus ada file pubspec.yaml di root project)"
            exit 1
          fi

          FLUTTER_DIR=$(dirname "$PUBSPEC_PATH")
          echo "✅ pubspec.yaml ditemukan di: $PUBSPEC_PATH"
          echo "📂 Flutter project directory : $FLUTTER_DIR"

          # Validasi lib/main.dart
          if [ ! -f "$FLUTTER_DIR/lib/main.dart" ]; then
            echo "⚠️  Warning: lib/main.dart tidak ditemukan"
            echo "   Build akan tetap dilanjutkan..."
          else
            echo "✅ lib/main.dart ditemukan"
          fi

          # Copy project ke WORK_DIR
          mkdir -p "${{ env.WORK_DIR }}"
          cp -r "$FLUTTER_DIR/." "${{ env.WORK_DIR }}/"
          echo "✅ Project disalin ke: ${{ env.WORK_DIR }}"

          # Simpan info ke output
          echo "project_dir=${{ env.WORK_DIR }}" >> $GITHUB_OUTPUT

          # Tampilkan isi pubspec.yaml
          echo ""
          echo "━━━━ pubspec.yaml ━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat "$PUBSPEC_PATH"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 14. flutter clean ─────────────────────────────────
      - name: "🧹 Flutter Clean"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧹 Running flutter clean..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter clean
          echo "✅ Clean selesai"

      # ── 15. flutter pub get ───────────────────────────────
      - name: "📦 Install Dependencies (flutter pub get)"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Running flutter pub get..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          flutter pub get
          echo "✅ Dependencies terinstall"

      # ── 16. Tentukan build flag dari build_type ───────────
      - name: "⚙️ Resolve Build Type"
        id: build_flags
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          echo "🔨 Build type diterima: $BUILD_TYPE"

          # Normalisasi: apapun yang mengandung 'debug' → debug, sisanya → release
          if echo "$BUILD_TYPE" | grep -qi "debug"; then
            FLAG="--debug"
            MODE="debug"
          else
            FLAG="--release"
            MODE="release"
          fi

          echo "✅ Build mode : $MODE"
          echo "✅ Build flag : $FLAG"
          echo "flag=$FLAG"   >> $GITHUB_OUTPUT
          echo "mode=$MODE"   >> $GITHUB_OUTPUT

      # ── 17. Build APK ─────────────────────────────────────
      - name: "📱 Build APK (${{ steps.build_flags.outputs.mode }})"
        working-directory: ${{ env.WORK_DIR }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔨 Building APK (${{ steps.build_flags.outputs.mode }})..."
          echo "    Tag        : ${{ github.event.inputs.tag }}"
          echo "    Build No.  : ${{ env.BUILD_NUMBER }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          flutter build apk \
            ${{ steps.build_flags.outputs.flag }} \
            --no-pub \
            --build-number=${{ env.BUILD_NUMBER }} \
            --split-per-abi \
            --verbose \
            2>&1 | tee /tmp/build_log.txt

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "❌ ERROR: flutter build apk gagal (exit code: $BUILD_EXIT)"
            echo ""
            echo "━━━━━━━━━━ BUILD LOG (TAIL) ━━━━━━━━━━━━━━━━"
            tail -100 /tmp/build_log.txt
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo ""
          echo "✅ APK build berhasil!"
          echo "📁 File APK:"
          find build/app/outputs/apk -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "  (tidak ditemukan)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 18. Rename APK dengan tag ─────────────────────────
      - name: "✏️ Rename APK with Tag"
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✏️  Renaming APK files with tag: ${{ github.event.inputs.tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          TAG="${{ github.event.inputs.tag }}"
          # Sanitasi tag: hilangkan karakter tidak valid untuk nama file
          SAFE_TAG=$(echo "$TAG" | tr -cs 'a-zA-Z0-9._-' '_')

          mkdir -p /tmp/apk_output

          find "${{ env.WORK_DIR }}/build/app/outputs/apk" \
            -name "*.apk" 2>/dev/null | while read APK; do
            BASENAME=$(basename "$APK" .apk)
            NEW_NAME="${SAFE_TAG}_${BASENAME}_build${{ env.BUILD_NUMBER }}.apk"
            cp "$APK" "/tmp/apk_output/$NEW_NAME"
            echo "  📱 $NEW_NAME ($(du -sh /tmp/apk_output/$NEW_NAME | awk '{print $1}'))"
          done

          echo ""
          echo "📁 APK siap upload:"
          ls -lh /tmp/apk_output/
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 19. Upload APK Artifact ───────────────────────────
      - name: "📤 Upload APK Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.tag }}-build${{ env.BUILD_NUMBER }}
          path: /tmp/apk_output/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 20. Build Summary ─────────────────────────────────
      - name: "📊 Build Summary"
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║          FLUTTER BUILD SUMMARY               ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  🏷️  Tag        : ${{ github.event.inputs.tag }}"
          echo "  🔨 Build Type : ${{ github.event.inputs.build_type }}"
          echo "  🔢 Build No.  : ${{ env.BUILD_NUMBER }}"
          echo "  📅 Timestamp  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  👤 Actor      : ${{ github.actor }}"
          echo "  🔗 Commit     : ${{ github.sha }}"
          echo ""
          echo "  ── APK Output ──────────────────────────────"
          ls -lh /tmp/apk_output/ 2>/dev/null | grep ".apk" | while read LINE; do
            echo "  📱 $LINE"
          done || echo "  (tidak ada APK)"
          echo ""
          echo "══════════════════════════════════════════════"
