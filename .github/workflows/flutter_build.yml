name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Build tag'
        required: true
        type: string
      build_type:
        description: 'release atau debug'
        required: false
        default: 'release'
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Download and Extract ZIP
        run: |
          echo "📥 Downloading: ${{ inputs.zip_url }}"
          curl -L --retry 3 --max-time 180 -o source.zip "${{ inputs.zip_url }}"
          echo "📦 Extracting ZIP..."
          unzip -q source.zip -d project_raw

          FLUTTER_ROOT=$(find project_raw -name "pubspec.yaml" -maxdepth 5 | head -1 | xargs dirname)
          if [ -z "$FLUTTER_ROOT" ]; then
            echo "❌ pubspec.yaml tidak ditemukan di ZIP!"
            exit 1
          fi
          echo "✅ Flutter root: $FLUTTER_ROOT"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" >> $GITHUB_ENV

      - name: Fix pubspec dependencies
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          rm -f pubspec.lock
          python3 << 'PYEOF'
import re

with open("pubspec.yaml", "r") as f:
    content = f.read()

overrides = {}

# Fix font_awesome_flutter
if "font_awesome_flutter" in content:
    overrides["font_awesome_flutter"] = """    font_awesome_flutter:
      git:
        url: https://github.com/fluttercommunity/font_awesome_flutter.git
        ref: master"""
    print("🔧 Akan override font_awesome_flutter")

if overrides:
    if "dependency_overrides:" not in content:
        override_block = "\ndependency_overrides:\n" + "\n".join(overrides.values()) + "\n"
        content = content.rstrip() + "\n" + override_block
    else:
        # Tambahkan ke dalam dependency_overrides yang sudah ada
        for pkg, block in overrides.items():
            if pkg not in content:
                content = re.sub(
                    r"(dependency_overrides:\s*\n)",
                    r"\1" + block + "\n",
                    content
                )
                print(f"✅ Override {pkg} ditambahkan")
            else:
                print(f"ℹ️ {pkg} sudah ada di overrides")

    with open("pubspec.yaml", "w") as f:
        f.write(content)
else:
    print("ℹ️ Tidak ada override yang diperlukan")
PYEOF

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          flutter pub get
          echo "✅ pub get selesai"

      - name: Build APK Release
        if: ${{ inputs.build_type == 'release' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          flutter build apk --release --no-tree-shake-icons
          echo "✅ APK Release selesai"

      - name: Build APK Debug
        if: ${{ inputs.build_type != 'release' }}
        working-directory: ${{ env.FLUTTER_ROOT }}
        run: |
          flutter build apk --debug --no-tree-shake-icons
          echo "✅ APK Debug selesai"

      - name: Find APK
        run: |
          APK=$(find "${{ env.FLUTTER_ROOT }}/build/app/outputs" -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK tidak ditemukan!"
            find "${{ env.FLUTTER_ROOT }}/build" -type f 2>/dev/null || true
            exit 1
          fi
          echo "✅ APK ditemukan: $APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.tag }}
          path: ${{ env.APK_PATH }}
          retention-days: 1
          
